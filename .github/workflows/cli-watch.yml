# Watches multica CLI releases. REFERENCE.md §10 pins the CLI surface to a version;
# when a newer CLI ships, this opens an issue so Mops (or a human) regenerates §10
# (`multica --help` + per-group --help — the whole procedure). Automation proposes,
# a human/Mops merges — nothing lands on main automatically.
name: cli-watch
on:
  schedule: [{cron: "0 8 * * 1"}]  # weekly, Monday 08:00 UTC
  workflow_dispatch: {}
permissions:
  issues: write
  contents: read
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare CLI versions
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          latest=$(gh api repos/multica-ai/multica-cli/releases/latest --jq .tag_name 2>/dev/null | sed 's/^v//')
          [ -z "$latest" ] && echo "no release info" && exit 0
          pinned=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' REFERENCE.md | head -1 | sed 's/^v//')
          echo "latest=$latest pinned=$pinned"
          [ "$latest" = "$pinned" ] && exit 0
          title="CLI v$latest released — regenerate REFERENCE §10 (pinned v$pinned)"
          gh issue list --search "$title" --json title --jq length | grep -q '^0$' || exit 0
          gh issue create --title "$title" --body "multica CLI v$latest is out; §10 pins v$pinned. Regenerate: \`multica --help\` + per-group \`--help\`, update the pinned version, PR it. (Live \`--help\` always wins over the map.)"
